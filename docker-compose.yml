services:
  superhub:
    build:
      context: .
      dockerfile: Dockerfile
    image: superhub:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HUB_DOMAIN: code.samlepirate.org
      HUB_HOST: 0.0.0.0
      HUB_PORT: 7777
      HUB_CORS_ORIGINS: https://code.samlepirate.org
      HUB_SQLITE_PATH: /app/packages/hub/data/hub.sqlite
    env_file:
      - .env
    ports:
      - "127.0.0.1:7777:7777"
    volumes:
      - superhub_data:/app/packages/hub/data

volumes:
  superhub_data:
